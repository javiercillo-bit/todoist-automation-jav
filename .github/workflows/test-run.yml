name: Todoist – TEST RUN (Ayer → Hoy)

on:
  workflow_dispatch:

jobs:
  test-label-rotation:
    runs-on: ubuntu-latest
    steps:
      - name: Rotar Ayer → Hoy (solo test)
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import time

          TOKEN = "${{ secrets.TODOIST_API_TOKEN }}"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Content-Type": "application/json"
          }

          BASE_URL   = "https://api.todoist.com/api/v1"
          FROM_LABEL = "Ayer"
          TO_LABEL   = "Hoy"

          # La API v1 pagina resultados — hay que iterar hasta agotar páginas
          def get_all_tasks():
              tasks = []
              cursor = None
              while True:
                  params = {"limit": 200}
                  if cursor:
                      params["cursor"] = cursor
                  resp = requests.get(f"{BASE_URL}/tasks", headers=HEADERS, params=params)
                  resp.raise_for_status()
                  data = resp.json()
                  tasks.extend(data.get("results", []))
                  cursor = data.get("next_cursor")
                  if not cursor:
                      break
              return tasks

          def update_task_labels(task_id, new_labels):
              resp = requests.post(
                  f"{BASE_URL}/tasks/{task_id}",
                  headers=HEADERS,
                  json={"labels": new_labels}
              )
              resp.raise_for_status()
              time.sleep(0.3)

          tasks = get_all_tasks()
          updated = 0
          skipped = 0

          for task in tasks:
              labels = task.get("labels", [])

              if "Atrasado" in labels:
                  skipped += 1
                  continue

              if FROM_LABEL in labels:
                  new_labels = [TO_LABEL if l == FROM_LABEL else l for l in labels]
                  update_task_labels(task["id"], new_labels)
                  print(f"✓ {task['content'][:70]}")
                  print(f"  {labels} → {new_labels}")
                  updated += 1

          print(f"\n--- Resultado ---")
          print(f"Actualizadas          : {updated}")
          print(f"Ignoradas (@Atrasado) : {skipped}")
          print(f"Sin etiqueta @Ayer    : {len(tasks) - updated - skipped}")
          EOF
