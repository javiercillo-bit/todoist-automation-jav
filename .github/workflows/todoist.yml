name: Todoist Automation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Mode to run"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - daily
          - weekly
          - monthly

  schedule:
    - cron: "0 3 * * *"
    - cron: "59 2 * * 1"
    - cron: "59 2 1 * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install requests

      - name: Set mode (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Selected mode: ${{ github.event.inputs.mode }}"
          echo "MODE=${{ github.event.inputs.mode }}" >> $GITHUB_ENV

      - name: Set mode (scheduled)
        if: github.event_name == 'schedule'
        run: |
          if [ "${{ github.event.schedule }}" == "0 3 * * *" ]; then
            echo "MODE=daily" >> $GITHUB_ENV
          elif [ "${{ github.event.schedule }}" == "59 2 * * 1" ]; then
            echo "MODE=weekly" >> $GITHUB_ENV
          else
            echo "MODE=monthly" >> $GITHUB_ENV
          fi

      - name: Debug MODE
        run: echo "MODE is $MODE"

      - name: Run script
        run: |
          echo "Running script..."
          python app.py || echo "Script failed"
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
          MODE: ${{ env.MODE }}
