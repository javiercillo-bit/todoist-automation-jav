name: Todoist – Rotación semanal de etiquetas

on:
  schedule:
    # Domingo 23:59 hora de Chile ≈ Lunes 02:59 UTC (UTC-3 verano)
    # Cron no soporta minutos exactos tipo 23:59, usamos 03:00 UTC del lunes
    - cron: "59 2 * * 1"
  workflow_dispatch:

jobs:
  rotate-weekly-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Rotar etiquetas semanales
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import time

          TOKEN = "${{ secrets.TODOIST_API_TOKEN }}"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Content-Type": "application/json"
          }

          BASE_URL = "https://api.todoist.com/api/v1"

          # Orden: de más vieja a más nueva para evitar doble rotación
          ROTATIONS = [
              ("Semana pasada",   "Atrasado"),
              ("Esta semana",     "Semana pasada"),
              ("Próxima semana",  "Esta semana"),
          ]

          def get_all_tasks():
              tasks = []
              cursor = None
              while True:
                  params = {"limit": 200}
                  if cursor:
                      params["cursor"] = cursor
                  resp = requests.get(f"{BASE_URL}/tasks", headers=HEADERS, params=params)
                  resp.raise_for_status()
                  data = resp.json()
                  tasks.extend(data.get("results", []))
                  cursor = data.get("next_cursor")
                  if not cursor:
                      break
              return tasks

          def update_task_labels(task_id, new_labels):
              resp = requests.post(
                  f"{BASE_URL}/tasks/{task_id}",
                  headers=HEADERS,
                  json={"labels": new_labels}
              )
              resp.raise_for_status()
              time.sleep(0.3)

          tasks = get_all_tasks()
          total_updated = 0

          for from_label, to_label in ROTATIONS:
              for task in tasks:
                  labels = task.get("labels", [])

                  if "Atrasado" in labels:
                      continue

                  if from_label in labels:
                      new_labels = [to_label if l == from_label else l for l in labels]
                      update_task_labels(task["id"], new_labels)
                      print(f"✓ [{from_label} → {to_label}] {task['content'][:60]}")
                      total_updated += 1

          print(f"\nTotal tareas actualizadas: {total_updated}")
          EOF
