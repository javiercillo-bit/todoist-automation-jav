name: Todoist – Rotación diaria de etiquetas

on:
  schedule:
    # 00:00 hora de Chile (America/Santiago = UTC-3 en horario de verano, UTC-4 en invierno)
    # Usamos 03:00 UTC como aproximación conservadora (cubre UTC-3)
    - cron: "0 3 * * *"
  workflow_dispatch: # permite ejecución manual para testear

jobs:
  rotate-daily-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Rotar etiquetas diarias
        env:
          TODOIST_API_TOKEN: ${{ secrets.TODOIST_API_TOKEN }}
        run: |
          python3 << 'EOF'
          import requests
          import time
          import sys

          TOKEN = "${{ secrets.TODOIST_API_TOKEN }}"
          HEADERS = {
              "Authorization": f"Bearer {TOKEN}",
              "Content-Type": "application/json"
          }

          # Orden de rotación: origen → destino
          # Se procesa de la etiqueta más "vieja" hacia la más "nueva"
          # para evitar que una tarea rote dos veces en el mismo run
          ROTATIONS = [
              ("Ayer",    "Atrasado"),
              ("Hoy",     "Ayer"),
              ("Mañana",  "Hoy"),
          ]

          def get_all_tasks():
              resp = requests.get("https://api.todoist.com/rest/v2/tasks", headers=HEADERS)
              resp.raise_for_status()
              return resp.json()

          def update_task_labels(task_id, new_labels):
              resp = requests.post(
                  f"https://api.todoist.com/rest/v2/tasks/{task_id}",
                  headers=HEADERS,
                  json={"labels": new_labels}
              )
              resp.raise_for_status()
              time.sleep(0.3)  # respeta el rate limit de Todoist

          tasks = get_all_tasks()
          total_updated = 0

          for from_label, to_label in ROTATIONS:
              for task in tasks:
                  labels = task.get("labels", [])

                  # Ignorar tareas que ya tienen @Atrasado
                  if "Atrasado" in labels:
                      continue

                  if from_label in labels:
                      new_labels = [to_label if l == from_label else l for l in labels]
                      update_task_labels(task["id"], new_labels)
                      print(f"✓ [{from_label} → {to_label}] {task['content'][:60]}")
                      total_updated += 1

          print(f"\nTotal tareas actualizadas: {total_updated}")
          EOF
